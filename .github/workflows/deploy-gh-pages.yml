name: Deploy To GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        # 中文注释：CI 中放宽 peerDependencies 校验，并在偶发安装失败时自动重试一次
        run: |
          npm install --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Build Static Site
        env:
          # 中文注释：自定义域名部署走根路径，静态资源从 /assets/... 加载
          VITE_BASE_PATH: /
        run: npm run build:static

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          # 中文注释：首次部署时自动为仓库启用 GitHub Pages（来源为 GitHub Actions）
          enablement: true

      - name: Write CNAME
        # 中文注释：将自定义域名写入构建产物，避免后续部署丢失域名绑定
        run: echo 'mountion.cn' > dist/public/CNAME

      - name: Add SPA 404 Fallback
        run: cp dist/public/index.html dist/public/404.html

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy To GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
